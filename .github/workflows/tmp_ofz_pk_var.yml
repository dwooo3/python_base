name: Temporary OFZ-PK history fetch

on:
  push:
    branches: [main]
    paths:
      - 'tmp_ofz_var/fetch_ofz_pk_history.py'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official MOEX history
        run: python3 tmp_ofz_var/fetch_ofz_pk_history.py
      - name: Commit payload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp_ofz_var/ofz_pk_history.json
          if git diff --cached --quiet; then
            echo "No payload changes"
          else
            git commit -m "Add temporary OFZ-PK history payload [skip ci]"
            git push
          fi
