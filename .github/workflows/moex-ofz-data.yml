name: MOEX OFZ data export

on:
  push:
    branches:
      - main
    paths:
      - .moex-run
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Aggregate portfolio backtest
        run: python aggregate_moex.py
      - name: Commit aggregate export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add moex_data
          git commit -m "Add MOEX portfolio backtest aggregate [skip ci]"
          git push
