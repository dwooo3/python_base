name: MOEX OFZ data export

on:
  push:
    branches:
      - main
    paths:
      - .moex-run
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check requests
      - name: Fetch actual MOEX ISS data
        run: python moex_fetch.py
      - name: Process portfolio data
        run: python process_moex.py
      - name: Commit data export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add moex_data
          git commit -m "Add processed MOEX OFZ portfolio data [skip ci]"
          git push
