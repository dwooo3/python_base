name: Temporary MOEX cleanup

on:
  push:
    branches:
      - main
    paths:
      - .cleanup-run

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Remove temporary MOEX files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf moex_data moex_fetch.py process_moex.py aggregate_moex.py .moex-run .cleanup-run .github/workflows/moex-ofz-data.yml
          git commit -m "Remove temporary MOEX calculation files [skip ci]"
          git push
