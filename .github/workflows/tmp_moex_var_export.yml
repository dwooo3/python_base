name: Temporary MOEX VaR export

on:
  pull_request:
    paths:
      - 'tmp_imoex2_var/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official MOEX histories
        run: python tmp_imoex2_var/fetch_imoex2_history.py
      - name: Upload MOEX payload
        uses: actions/upload-artifact@v4
        with:
          name: imoex2-history
          path: tmp_imoex2_var/imoex2_history.json
          retention-days: 1
