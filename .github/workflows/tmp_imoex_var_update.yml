name: Temporary IMOEX history export

on:
  push:
    branches: [main]
    paths:
      - 'tmp_imoex_var/fetch_imoex_history.py'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official MOEX IMOEX update
        run: python3 tmp_imoex_var/fetch_imoex_history.py
      - name: Commit small update payload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp_imoex_var/imoex_update.json
          if git diff --cached --quiet; then
            echo "No payload changes"
          else
            git commit -m "Add temporary IMOEX update payload [skip ci]"
            git push
          fi
