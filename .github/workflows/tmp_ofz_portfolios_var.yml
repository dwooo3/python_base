name: Temporary OFZ portfolios history export

on:
  pull_request:
    branches: [main]
    paths:
      - 'tmp_ofz_portfolios/fetch_history.py'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch official MOEX history
        run: python3 tmp_ofz_portfolios/fetch_history.py
      - name: Upload MOEX payload
        uses: actions/upload-artifact@v4
        with:
          name: ofz-portfolios-history
          path: tmp_ofz_portfolios/ofz_portfolios_history.json
          if-no-files-found: error
          retention-days: 1
